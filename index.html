<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherius AI | Zenith Project</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #58a6ff;
            --text: #c9d1d9;
            --user-msg: #238636;
            --ai-msg: #21262d;
            --border: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: var(--card);
        }

        header h1 { margin: 0; font-size: 1.2rem; color: var(--accent); }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 0.95rem;
        }

        .user { 
            align-self: flex-end; 
            background: var(--user-msg); 
            color: white; 
            border-bottom-right-radius: 2px; 
        }

        .ai { 
            align-self: flex-start; 
            background: var(--ai-msg); 
            border: 1px solid var(--border); 
            border-bottom-left-radius: 2px; 
        }

        .input-area {
            padding: 20px;
            background: var(--card);
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0d1117;
            color: white;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<header>
    <h1>Aetherius AI v1.0</h1>
    <small>Developed by Zenith</small>
</header>

<div id="chat-container">
    <div class="message ai">Halo Zen! Aetherius AI sudah online. Mau ngetes apa kita hari ini?</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Tanya sesuatu..." autocomplete="off">
    <button id="sendBtn">Kirim</button>
</div>

<script>
    // === KONFIGURASI ===
    const API_KEY = "AIzaSyBJ5wXoKMI-560-7PvdiFha3SquoWaXS7g"; 
    
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerText = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || sendBtn.disabled) return;

        // Tampilkan pesan user
        appendMessage('user', text);
        userInput.value = '';
        sendBtn.disabled = true;

        // URL API Gemini 1.5 Flash
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                appendMessage('ai', "Error dari Google: " + data.error.message);
            } else if (data.candidates && data.candidates[0].content) {
                const aiResponse = data.candidates[0].content.parts[0].text;
                appendMessage('ai', aiResponse);
            } else {
                appendMessage('ai', "Hmm, responnya kosong. Coba cek API Key atau kuota kamu.");
            }
        } catch (error) {
            appendMessage('ai', "Gagal tersambung. Pastikan API Key benar dan internet lancar.");
            console.error("Detail Error:", error);
        } finally {
            sendBtn.disabled = false;
        }
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
